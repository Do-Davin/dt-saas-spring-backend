spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5434}/${POSTGRES_DB:dt_saas_spring_dev}
spring.datasource.username=${POSTGRES_USER:development}
spring.datasource.password=${POSTGRES_PASSWORD:development}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true