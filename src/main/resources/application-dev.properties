spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5434}/${POSTGRES_DB:dt_saas_spring_dev}
spring.datasource.username=${POSTGRES_USER:development}
spring.datasource.password=${POSTGRES_PASSWORD:development}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

app.jwt.secret=${APP_JWT_SECRET:dt-saas-dev-secret-key-override-in-prod-min-32-chars-0123456789ab}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:604800}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

app.storage.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.storage.region=${MINIO_REGION:us-east-1}
app.storage.bucket=${MINIO_BUCKET:dt-saas-dev}
app.storage.access-key=${MINIO_ROOT_USER:development}
app.storage.secret-key=${MINIO_ROOT_PASSWORD:development}