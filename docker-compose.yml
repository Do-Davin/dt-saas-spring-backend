services:
  postgres:
    image: postgres:17
    container_name: dt-saas-spring-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dt_saas_spring}
      POSTGRES_USER: ${POSTGRES_USER:-dt_saas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dt_saas_password}
    volumes:
      - dt_saas_spring_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: dt-saas-spring-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - dt_saas_spring_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  dt_saas_spring_postgres_data:
  dt_saas_spring_minio_data: